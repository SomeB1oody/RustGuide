name: Deploy multilingual mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build English book
        run: mdbook build en

      - name: Build Chinese book
        run: mdbook build zh-Hans

      - name: Add language selector homepage
        run: |
          cat > book/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Rust Guide</title>
            <style>
              body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 720px;
                margin: 80px auto;
                padding: 0 24px;
                line-height: 1.6;
              }
              a {
                display: inline-block;
                margin-right: 16px;
                font-size: 18px;
              }
            </style>
          </head>
          <body>
            <h1>Rust Guide</h1>
            <p>Please select a language:</p>
            <p>
              <a href="./en/">English</a>
              <a href="./zh-Hans/">中文</a>
            </p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4